<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1e1e2a;
      color: #ccc;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
    }
    .header img { width: 24px; height: 24px; border-radius: 5px; }
    .header-title { font-size: 13px; font-weight: 600; color: #ddd; flex: 1; }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      padding: 0 16px;
      margin: 0 0 4px;
    }
    .options { padding: 0 8px 2px; }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .option:hover { background: rgba(255,255,255,0.04); }
    .option.selected { background: rgba(130,160,220,0.1); }
    .option input[type="radio"] { display: none; }
    .radio-dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .radio-dot::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7a9ec9;
      transform: scale(0);
      transition: transform 0.15s;
    }
    .option.selected .radio-dot { border-color: #7a9ec9; }
    .option.selected .radio-dot::after { transform: scale(1); }
    .label-name { font-weight: 500; }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 8px 16px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      font-size: 13px;
    }
    .toggle-row span { font-weight: 500; }
    .switch {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #666;
      transition: transform 0.2s, background 0.2s;
    }
    .switch input:checked + .slider { background: rgba(122,158,201,0.3); }
    .switch input:checked + .slider::after {
      transform: translateX(14px);
      background: #7a9ec9;
    }
    .tip {
      position: relative;
      cursor: help;
      border-bottom: 1px dotted #555;
    }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: #333;
      color: #ddd;
      font-size: 11px;
      font-weight: 400;
      padding: 6px 10px;
      border-radius: 6px;
      width: 180px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.4;
    }
    .tip:hover::after { opacity: 1; }
    .body-content { transition: opacity 0.2s; }
    .body-content.disabled { opacity: 0.35; pointer-events: none; }
    .spacer { height: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-128.png" alt="">
    <span class="header-title">Gemini Model Default</span>
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="body-content" id="body-content">
    <p class="section-label">Default model</p>
    <div class="options" id="options"></div>

    <hr class="divider">

    <div class="toggle-row">
      <span class="tip" data-tip="Keep your manual model selection across new conversations">Remember my choice</span>
      <label class="switch">
        <input type="checkbox" id="rememberAcrossConvos">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span>Notifications</span>
      <label class="switch">
        <input type="checkbox" id="showToast">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div class="spacer"></div>
  <script src="popup.js"></script>
</body>
</html>
